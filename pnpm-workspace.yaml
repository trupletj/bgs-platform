packages:
  - "apps/*"
  - "packages/*"

# Expo + React Native require a flat node_modules layout to resolve peer deps
# correctly under Metro. pnpm's default isolated layout breaks @expo/metro-runtime
# and many react-native autolinking lookups, so we mimic npm's flat hoisting.
nodeLinker: hoisted

# Allow native builds for packages that need post-install scripts
allowBuilds:
  sharp: true
  unrs-resolver: true
